name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '17'

jobs:
  # ========== 编译 + 测试 + 打包 + 镜像 ==========
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Maven 编译
        run: mvn compile -B -q

      - name: Maven 测试
        run: mvn test -B

      - name: Maven 打包
        run: mvn package -Dmaven.test.skip=true -B -q

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Docker 镜像（gateway）
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: false
          load: true
          tags: gateway:latest

      - name: 构建 Docker 镜像（auth-service）
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          push: false
          load: true
          tags: auth-service:latest

      - name: 构建 Docker 镜像（student-service）
        uses: docker/build-push-action@v6
        with:
          context: ./student-service
          push: false
          load: true
          tags: student-service:latest

      - name: 构建 Docker 镜像（message-service）
        uses: docker/build-push-action@v6
        with:
          context: ./message-service
          push: false
          load: true
          tags: message-service:latest

      - name: 验证镜像
        run: docker images
