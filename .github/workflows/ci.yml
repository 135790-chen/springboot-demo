name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '17'

jobs:
  # ========== 编译 + 测试 ==========
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Maven 编译
        run: mvn compile -B -q

      - name: Maven 测试
        run: mvn test -B

      - name: Maven 打包（跳过测试，已单独跑过）
        run: mvn package -Dmaven.test.skip=true -B -q

      - name: 上传 JAR 包（供后续 job 使用）
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: |
            */target/*.jar
          retention-days: 1

  # ========== 构建 Docker 镜像 ==========
  docker:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, student-service, gateway, message-service]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 下载 JAR 包
        uses: actions/download-artifact@v4
        with:
          name: service-jars

      - name: 移动 JAR 到对应目录
        run: |
          mkdir -p ${{ matrix.service }}/target
          mv ${{ matrix.service }}-*.jar ${{ matrix.service }}/target/

      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          load: true
          tags: ${{ matrix.service }}:latest

      - name: 验证镜像
        run: docker images ${{ matrix.service }}
